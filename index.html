<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-6N08Z9G5MP"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'G-6N08Z9G5MP', {
            'debug_mode': true,
            'send_page_view': true,
            'cookie_flags': 'SameSite=None;Secure'
        });
        gtag('event', 'page_view', {
            'page_title': 'Typsa Tools',
            'page_location': window.location.href
        });
    </script>

    <title>Typsa Tools</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <main class="app-shell">
        <section class="panel">
            <header class="hero">
                <div class="brand">
                    <img src="src/logo.png" alt="Typsa logo" class="brand-logo">
                    <div class="brand-copy">
                        <h1>Typsa Tools</h1>
                    </div>
                </div>
                <div id="status" class="status-banner status-hidden" role="status" aria-hidden="true"></div>
            </header>

            <nav class="tool-switcher" aria-label="Typsa tools">
                <button class="tool-tab is-active" type="button" data-view-target="labels-view" aria-pressed="true">
                    <span class="material-icons-round tool-tab-icon" aria-hidden="true">sell</span>
                    <span class="tool-tab-label">Labels</span>
                </button>
                <button class="tool-tab" type="button" data-view-target="4d-view" aria-pressed="false">
                    <span class="material-icons-round tool-tab-icon" aria-hidden="true">timeline</span>
                    <span class="tool-tab-label">4D</span>
                </button>
                <button class="tool-tab" type="button" data-view-target="assistant-view" aria-pressed="false">
                    <span class="material-icons-round tool-tab-icon" aria-hidden="true">smart_toy</span>
                    <span class="tool-tab-label">Assistant</span>
                </button>
            </nav>

            <section id="labels-view" class="tool-view is-active" aria-labelledby="labels-title">
                <div class="view-heading">
                    <p class="view-kicker">Tool</p>
                    <h2 id="labels-title">Labels</h2>
                </div>

                <section class="control-group">
                    <label for="property-names" class="control-label">Property Set</label>
                    <select id="property-names" class="modern-select">
                        <option value="" selected>Loading model properties...</option>
                    </select>
                </section>

                <section class="control-group">
                    <label for="label-scope" class="control-label">Label Scope</label>
                    <select id="label-scope" class="modern-select">
                        <option value="selection" selected>Selected object</option>
                        <option value="all">All objects</option>
                    </select>
                </section>

                <section class="action-bar">
                    <button id="clear-btn" class="action-button action-button-secondary" type="button">Clear</button>
                    <button id="apply-btn" class="action-button action-button-primary" type="button">Create</button>
                </section>
            </section>

            <section id="4d-view" class="tool-view tool-view-placeholder" aria-labelledby="4d-title" hidden>
                <div class="view-heading">
                    <h2 id="4d-title">4D</h2>
                </div>

                <section class="control-group">
                    <label for="phase-property-names" class="control-label">Phase Source</label>
                    <select id="phase-property-names" class="modern-select">
                        <option value="" selected>Loading model properties...</option>
                    </select>
                </section>

                <section class="control-group">
                    <div class="phase-list-header">
                        <span class="control-label">Phases</span>
                        <span id="phase-count" class="phase-count">0</span>
                    </div>
                    <div id="phase-cards" class="phase-cards" aria-live="polite">
                        <p class="phase-empty">Select a property to load phase values.</p>
                    </div>
                </section>

                <section class="control-group">
                    <div class="slider-header">
                        <label for="transition-seconds" class="control-label">Transition</label>
                        <span id="transition-seconds-value" class="slider-value">2.0s</span>
                    </div>
                    <input id="transition-seconds" class="phase-slider" type="range" min="0.5" max="10" step="0.5" value="2">
                </section>

                <p id="active-phase-label" class="active-phase-label">No active phase</p>
                <section class="playback-bar" aria-label="4D playback controls">
                    <button id="phase-prev-btn" class="icon-action-button" type="button" aria-label="Previous phase">
                        <span class="material-icons-round" aria-hidden="true">skip_previous</span>
                    </button>
                    <button id="phase-play-btn" class="icon-action-button icon-action-button-primary" type="button" aria-label="Play sequence">
                        <span class="material-icons-round" aria-hidden="true">play_arrow</span>
                    </button>
                    <button id="phase-next-btn" class="icon-action-button" type="button" aria-label="Next phase">
                        <span class="material-icons-round" aria-hidden="true">skip_next</span>
                    </button>
                </section>
            </section>

            <section id="assistant-view" class="tool-view tool-view-placeholder" aria-labelledby="assistant-title" hidden>
                <div class="view-heading">
                    <p class="view-kicker">Tool</p>
                    <h2 id="assistant-title">Assistant</h2>
                </div>
                <p class="placeholder-copy">Reserved space for the future assistant tool.</p>
            </section>
        </section>

        <div class="compat-hidden" aria-hidden="true">
            <input type="checkbox" id="recreate-check" checked>
            <input type="checkbox" id="live-labels-check">
            <div class="position-selector-longitudinal">
                <button type="button" class="position-box" data-position="start">Start</button>
                <button type="button" class="position-box active" data-position="middle">Middle</button>
                <button type="button" class="position-box" data-position="end">End</button>
            </div>
            <div class="position-selector-section">
                <button type="button" class="position-box" data-position="top-left">Top Left</button>
                <button type="button" class="position-box" data-position="top-center">Top Center</button>
                <button type="button" class="position-box" data-position="top-right">Top Right</button>
                <button type="button" class="position-box" data-position="middle-left">Middle Left</button>
                <button type="button" class="position-box active" data-position="middle-center">Center</button>
                <button type="button" class="position-box" data-position="middle-right">Middle Right</button>
                <button type="button" class="position-box" data-position="bottom-left">Bottom Left</button>
                <button type="button" class="position-box" data-position="bottom-center">Bottom Center</button>
                <button type="button" class="position-box" data-position="bottom-right">Bottom Right</button>
            </div>
            <button id="box-btn" type="button">Box</button>
            <button id="dimensions-btn" type="button">Dimensions</button>
            <span id="selected-count">0</span>
            <span id="labels-count">0</span>
            <div id="log" class="log"></div>
        </div>
    </main>

    <script src="https://components.connect.trimble.com/trimble-connect-workspace-api/index.js"></script>
    <script src="markup-tool.js"></script>
</body>

</html>
